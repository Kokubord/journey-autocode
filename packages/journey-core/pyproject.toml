[project]
name = "journey-core"
version = "0.1.0"
description = "Journey core: shared models, parsers, handshake protocol, and write routing."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2",
    "pyyaml>=6",
    "gitpython>=3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/journey_core"]
